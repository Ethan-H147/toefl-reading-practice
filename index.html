<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A calm, focused practice space for TOEFL reading and listening questions."
    />
    <title>TOEFL Training</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,500;6..72,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <button class="brand" data-action="home" aria-label="Go to home">
          <span class="brand-mark">T</span>
          <span class="brand-copy">
            <strong>TOEFL Training</strong>
            <small>Mock Practice Tests</small>
          </span>
        </button>
      </header>

      <nav class="site-nav" aria-label="Primary navigation">
        <div>
          <button class="active" data-action="home">Home</button>
          <button data-action="home">Mock Tests</button>
          <span>English Practice</span>
        </div>
      </nav>

      <div id="persistent-audio-dock" aria-hidden="true"></div>
      <main id="app" tabindex="-1"></main>

      <footer class="site-footer">
        <span>Read. Listen. Grow.</span>
        <button class="text-button reset-button" id="reset-progress">Reset progress</button>
      </footer>
    </div>

    <script src="questions.js"></script>
    <script src="app.js"></script>
  </body>
</html>
